<!DOCTYPE html>
<html>
<head>
<title>Lead Capture</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:Arial;padding:20px;background:#f5f5f5}
input,textarea{width:100%;padding:10px;margin:5px 0;border:1px solid #ccc;border-radius:6px}
button{background:#0070f3;color:white;border:none;padding:12px;border-radius:6px;width:100%;font-size:16px}
.card{background:white;padding:15px;border-radius:10px;margin-top:10px}
</style>
</head>

<body>

<h2>Door Knock Lead Capture</h2>

<input id="business" placeholder="Business Name">
<input id="name" placeholder="Contact Name">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">
<input id="funding" placeholder="Funding Needed">
<textarea id="notes" placeholder="Notes"></textarea>

<button onclick="saveLead()">Save Lead</button>

<div id="leads"></div>

<script>

let leads = JSON.parse(localStorage.getItem("leads") || "[]")

function saveLead(){
let lead={
business:document.getElementById("business").value,
name:document.getElementById("name").value,
phone:document.getElementById("phone").value,
email:document.getElementById("email").value,
funding:document.getElementById("funding").value,
notes:document.getElementById("notes").value
}

leads.push(lead)

localStorage.setItem("leads",JSON.stringify(leads))

render()

document.querySelectorAll("input,textarea").forEach(x=>x.value="")
}

function render(){
let html=""
leads.forEach(l=>{
html+=`<div class="card">
<b>${l.business}</b><br>
${l.name}<br>
${l.phone}<br>
£${l.funding}
</div>`
})

document.getElementById("leads").innerHTML=html
}

render()

</script>

</body>
</html>
